<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Work Circuit mark</title>
  <desc id="desc">A rounded purple W monogram with a balanced circuit terminal node.</desc>
  <defs>
    <linearGradient id="workcircuit-purple" x1="92" y1="116" x2="420" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <mask id="terminal-hole">
      <rect width="512" height="512" fill="white"/>
      <circle cx="408" cy="126" r="12" fill="black"/>
